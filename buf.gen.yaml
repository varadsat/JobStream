version: v2
# Regenerate with: make proto   (requires buf — brew install bufbuild/buf/buf)
# Protoc fallback also works:   see Makefile for the protoc invocation.
clean: true
plugins:
  - local: protoc-gen-go
    out: gen/go
    opt:
      - paths=source_relative
  - local: protoc-gen-go-grpc
    out: gen/go
    opt:
      - paths=source_relative
      - require_unimplemented_servers=false
