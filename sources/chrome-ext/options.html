<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>JobStream — Options</title>
    <style>
      body { font-family: system-ui, sans-serif; max-width: 540px; margin: 24px auto; padding: 0 16px; }
      label { display: block; margin: 12px 0 4px; font-weight: 600; }
      input, textarea { width: 100%; padding: 6px; box-sizing: border-box; font-family: ui-monospace, monospace; }
      textarea { min-height: 80px; }
      button { margin-top: 16px; padding: 8px 16px; cursor: pointer; }
      #status { margin-left: 12px; }
      .ok { color: #137333; }
      .hint { font-size: 12px; color: #5f6368; margin-top: 4px; }
    </style>
  </head>
  <body>
    <h2>JobStream extension settings</h2>

    <label for="user_id">User ID</label>
    <input id="user_id" placeholder="alice" />
    <div class="hint">Sent as the <code>user_id</code> field on every submission. Must match the <code>user_id</code> claim in the JWT.</div>

    <label for="jwt">JWT (Bearer)</label>
    <textarea id="jwt" placeholder="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."></textarea>
    <div class="hint">Mint one for local dev with the scraper or dashboard-cli helper, or generate via jwt.io with HS256 and the intake's <code>JWT_SECRET</code>.</div>

    <label for="gateway">Gateway URL</label>
    <input id="gateway" placeholder="http://localhost:8081" />

    <div>
      <button id="save">Save</button>
      <span id="status"></span>
    </div>

    <script src="options.js"></script>
  </body>
</html>
